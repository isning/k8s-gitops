name: Update Image Lock

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      cluster:
        description: "Cluster name under clusters/ (or 'all')"
        required: true
        default: "all"
      arch:
        description: "Container architecture"
        required: true
        default: "amd64"
      os:
        description: "Container OS"
        required: true
        default: "linux"

permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Setup Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39 # v13

      - name: Cache uv tools (flux-local)
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-flux-local-8.2.0

      - name: Restore image digest/hash cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cache/nixos-image-lock
          key: nixos-image-lock-${{ github.event.inputs.arch || 'amd64' }}-${{ github.event.inputs.os || 'linux' }}-v1-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            nixos-image-lock-${{ github.event.inputs.arch || 'amd64' }}-${{ github.event.inputs.os || 'linux' }}-v1-

      - name: Generate lock
        run: |
          COMMIT_MSG_FILE="${{ github.workspace }}/pr_commit_msg.txt"
          REPORT_PATH="${{ github.workspace }}/pr_report.md"

          cluster="${{ github.event.inputs.cluster || 'all' }}"
          arch="${{ github.event.inputs.arch || 'amd64' }}"
          os="${{ github.event.inputs.os || 'linux' }}"
          common_args="--arch $arch --os $os --commit-msg-file $COMMIT_MSG_FILE --report-file $REPORT_PATH"

          if [[ "$cluster" == "all" ]]; then
            nix run .#gen-image-lock-all -- $common_args
          else
            nix run .#gen-image-lock -- --cluster "$cluster" $common_args
          fi

      - name: Save image digest/hash cache
        if: always() && !cancelled()
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cache/nixos-image-lock
          key: ${{ runner.os }}-nixos-image-lock-${{ github.event.inputs.arch || 'amd64' }}-${{ github.event.inputs.os || 'linux' }}-v1-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Set Commit Message Output
        id: msg_output
        run: |
          if [[ -f final_commit_msg.txt ]]; then
            echo "COMMIT_MSG<<EOF" >> $GITHUB_OUTPUT
            cat final_commit_msg.txt >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "COMMIT_MSG=chore(lock): no image changes detected" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: ${{ steps.msg_output.outputs.COMMIT_MSG }}
          title: "chore(lock): refresh flux image lock"
          body-path: ${{ github.workspace }}/pr_report.md
          branch: ci/auto-update-lock/${{ github.run_id }}
          base: main
          delete-branch: true
          add-paths: |
            clusters/**/images.lock.nix

      - name: Force Merge PR 
        if: steps.cpr.outputs.pull-request-operation == 'created'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ steps.cpr.outputs.pull-request-number }}
          echo "Using bypass privileges to squash merge PR #$PR_NUMBER..."

          gh pr merge $PR_NUMBER --squash --admin
