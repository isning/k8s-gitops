apiVersion: apps/v1
kind: Deployment
metadata:
  name: proxy-engine
  namespace: egress-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: proxy-engine
  template:
    metadata:
      labels:
        app: proxy-engine
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
      - name: fetch-nodes
        image: docker.io/library/python:3.14-alpine@sha256:dd4d2bd5b53d9b25a51da13addf2be586beebd5387e289e798e4083d94ca837a
        envFrom:
        - secretRef:
            name: sub-converter-suburls-secret
        env:
        - name: HOME
          value: /tmp
        command: ["python3", "/scripts/update_sub.py"]
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
          seccompProfile:
            type: RuntimeDefault
        resources:
          requests: 
            cpu: 50m
            memory: 32Mi
          limits:
            cpu: 500m
            memory: 64Mi
        volumeMounts:
        - name: script-volume
          mountPath: /scripts
          readOnly: true
        - name: config-temp
          mountPath: /shared-nodes
        - name: tmp
          mountPath: /tmp
      containers:
      - name: sing-box
        image: ghcr.io/sagernet/sing-box:v1.13.12@sha256:da0e2331395c9025a85fa58892772b4cdbe5f2e530e93defeec3968175d06c6d
        command: 
        - "sing-box"
        - "run"
        - "-D"
        - "/var/lib/sing-box"
        - "-c"
        - "/etc/sing-box/main/main.json"
        - "-c"
        - "/etc/sing-box/temp/nodes.json"
        ports:
        - containerPort: 7890
          name: mixed-proxy
        - containerPort: 9090
          name: clash-api
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
          seccompProfile:
            type: RuntimeDefault
        livenessProbe:
          httpGet:
            path: /version
            port: 9090
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /version
            port: 9090
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3
        resources:
          requests: 
            cpu: 50m
            memory: 32Mi
          limits:
            cpu: 500m
            memory: 64Mi
        volumeMounts:
        - name: config-main
          mountPath: /etc/sing-box/main
          readOnly: true
        - name: config-temp
          mountPath: /etc/sing-box/temp
          readOnly: true
        # This should be considered non-persistent and can be cleared on each restart,
        # as it's mainly used for caching geoip and geosite data.
        - name: work-cache
          mountPath: /var/lib/sing-box
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: config-main
        configMap:
          name: sing-box-main-config
      - name: config-temp
        persistentVolumeClaim:
          claimName: nodes-cache
      - name: script-volume
        configMap:
          name: sub-converter-script-config
      - name: tmp
        emptyDir:
          sizeLimit: 50Mi
      - name: work-cache
        persistentVolumeClaim:
          claimName: proxy-engine-work-cache
