---
apiVersion: v1
kind: Service
metadata:
  name: proxy-svc
  namespace: egress-system
  labels:
    app: proxy-engine
spec:
  ports:
  - port: 7890
    name: mixed-proxy
    appProtocol: tcp # Avoid sniffing this as HTTP by Istio, which causes 404
    protocol: TCP
    targetPort: 7890
  - port: 9090
    name: clash-api
    appProtocol: http
    protocol: TCP
    targetPort: 9090
  selector:
    app: proxy-engine
