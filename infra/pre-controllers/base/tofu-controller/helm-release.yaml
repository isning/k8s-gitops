---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tofu-controller
  namespace: flux-system
spec:
  releaseName: tofu-controller
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: tofu-controller
    namespace: flux-system
  install:
    crds: Create
    remediation:
      retries: -1
  upgrade:
    crds: CreateReplace
    remediation:
      retries: -1
  values:
    runner:
      serviceAccount:
        allowedNamespaces:
          - flux-system
          - harbor
