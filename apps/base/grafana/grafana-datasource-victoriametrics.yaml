apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: victoriametrics
spec:
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  datasource:
    name: VictoriaMetrics
    type: prometheus
    access: proxy
    url: http://vmselect-victoriametrics-vmks.monitoring.svc.cluster.local:8481/select/0/prometheus
    isDefault: true
    jsonData:
      timeInterval: 20s
