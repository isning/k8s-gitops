name: test

# Copy from https://github.com/fluxcd/flux2-kustomize-helm-example/blob/main/.github/workflows/test.yaml

on:
  workflow_dispatch:
  pull_request:
    branches: 
      - 'main'
  merge_group:
    branches: 
      - 'main'
  push:
    branches: 
      - 'main'
      - '!ci/auto-update-lock/**'
    tags-ignore: [ '*' ]

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      archive_related: ${{ steps.filter.outputs.archive_related }}
      gitops_related: ${{ steps.filter.outputs.gitops_related }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Detect archive-related changes
        id: filter
        uses: dorny/paths-filter@9d7afb8d214ad99e78fbd4247752c4caed2b6e4c # v4
        with:
          filters: |
            archive_related:
              - '.github/workflows/**'
              - 'lib/mkMultiArchImageArchive.nix'
              - 'scripts/test-mk-multiarch-archive.sh'
            gitops_related:
              - '.github/workflows/**'
              - 'infra/**'
              - 'apps/**'
              - 'vms/**'
              - 'clusters/**'

  archive-hash-regression:
    if:  ${{ needs.changes.outputs.archive_related == 'true' }}
    needs:
      - changes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      - name: Setup Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39 # v13
      - name: Install and start containerd
        run: |
          sudo apt-get update
          sudo apt-get install -y containerd
          sudo systemctl enable --now containerd
          sudo systemctl is-active --quiet containerd
      - name: Verify containerd health
        run: |
          sudo ctr version
      - name: Run archive hash regression test
        env:
          CONTAINERD_ADDRESS: /run/containerd/containerd.sock
        run: bash ./scripts/test-mk-multiarch-archive.sh

  manifests:
    if:  ${{ needs.changes.outputs.gitops_related == 'true' }}
    needs:
      - changes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup yq
        uses: fluxcd/pkg/actions/yq@f1acb236137acb1283bf3b6be88110479dfd4f45 # main
      - name: Setup kubeconform
        uses: fluxcd/pkg/actions/kubeconform@f1acb236137acb1283bf3b6be88110479dfd4f45 # main
      - name: Setup kustomize
        uses: fluxcd/pkg/actions/kustomize@f1acb236137acb1283bf3b6be88110479dfd4f45 # main
      - name: Validate manifests
        run: ./scripts/validate.sh
        env:
          # Set to 'true' to fail CI when schema is missing.
          STRICT_MISSING_SCHEMAS: "false"

  flux-local-test:
    if:  ${{ needs.changes.outputs.gitops_related == 'true' }}
    needs:
      - changes
    runs-on: ubuntu-latest
    strategy:
      matrix:
        cluster:
          - kubevirt-lab-1
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@04acaec6161ac4fb1a82ffafa88901c03271d34f # v2.8.6
      - name: Setup kustomize
        uses: fluxcd/pkg/actions/kustomize@f1acb236137acb1283bf3b6be88110479dfd4f45 # main
      - name: flux-local test
        uses: allenporter/flux-local/action/test@4d666add25002f550dc0dbe8b2b2f25859169b34 # 8.2.0
        with:
          path: clusters/${{ matrix.cluster }}
          enable-helm: true

  flux-local-diff:
    if:  ${{ needs.changes.outputs.gitops_related == 'true' }}
    needs:
      - changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        cluster:
          - kubevirt-lab-1
        resource:
          - kustomization
          - helmrelease
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@04acaec6161ac4fb1a82ffafa88901c03271d34f # v2.8.6
      - name: Setup kustomize
        uses: fluxcd/pkg/actions/kustomize@f1acb236137acb1283bf3b6be88110479dfd4f45 # main
      - name: flux-local diff
        id: diff
        uses: allenporter/flux-local/action/diff@4d666add25002f550dc0dbe8b2b2f25859169b34 # 8.2.0
        continue-on-error: true
        with:
          live-branch: main
          path: clusters/${{ matrix.cluster }}
          resource: ${{ matrix.resource }}
      - name: Write diff artifact payload
        if: ${{ always() }}
        env:
          CLUSTER: ${{ matrix.cluster }}
          RESOURCE: ${{ matrix.resource }}
          DIFF_OUTPUT: ${{ steps.diff.outputs.diff }}
          DIFF_OUTCOME: ${{ steps.diff.outcome }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/attempts/${{ github.run_attempt }}
        run: |
          mkdir -p artifacts
          python3 - <<'PY'
          import json
          import os

          payload = {
            "cluster": os.environ["CLUSTER"],
            "resource": os.environ["RESOURCE"],
            "outcome": os.environ["DIFF_OUTCOME"],
            "diff": os.environ.get("DIFF_OUTPUT", ""),
            "run_url": os.environ["RUN_URL"],
          }

          with open(os.path.join("artifacts", f"diff-{payload['cluster']}-{payload['resource']}.json"), "w", encoding="utf-8") as handle:
            json.dump(payload, handle)
          PY
      - name: Upload diff artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: flux-local-diff-${{ matrix.cluster }}-${{ matrix.resource }}
          path: artifacts/diff-${{ matrix.cluster }}-${{ matrix.resource }}.json
          if-no-files-found: error
      - name: Fail job if diff failed
        if: ${{ steps.diff.outcome != 'success' }}
        run: |
          echo "flux-local diff failed for resource=${{ matrix.resource }}"
          exit 1

  aggregate-comment:
    needs: flux-local-diff
    if: |
      always() && 
      needs.flux-local-diff.result != 'skipped'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Create GitHub App token
        id: app-token
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - name: Download diff artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts
          pattern: flux-local-diff-*
          merge-multiple: true
      - name: Build combined PR comment
        id: build_comment
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/attempts/${{ github.run_attempt }}
        run: |
          cat > build_comment.py <<'PYEOF'
          import glob
          import json
          from collections import defaultdict

          files = sorted(glob.glob("artifacts/**/*.json", recursive=True))
          grouped = defaultdict(list)
          total_resources = 0
          total_changed = 0
          total_no_change = 0
          total_failed = 0

          for file_path in files:
            with open(file_path, "r", encoding="utf-8") as handle:
              item = json.load(handle)
            cluster = item.get("cluster", "unknown")
            resource = item.get("resource", "unknown")
            outcome = item.get("outcome", "failure")
            diff = item.get("diff", "") or ""
            has_diff = bool(diff.strip())

            status = "failed"
            if outcome == "success":
              status = "changed" if has_diff else "no-change"

            grouped[cluster].append({
              "resource": resource,
              "status": status,
              "diff": diff,
            })

            total_resources += 1
            if status == "changed":
              total_changed += 1
            elif status == "no-change":
              total_no_change += 1
            else:
              total_failed += 1

          short_sha = "${{ github.sha }}"[:7]
          print("## flux-local diff summary")
          print()
          print(f"Commit: `{short_sha}` | Clusters: {len(grouped)} | Resources: {total_resources}")
          print(f"Changed: {total_changed} | No change: {total_no_change} | Failed: {total_failed}")
          print()

          if not grouped:
            print("No matrix diff artifacts were found.")
            print()
          elif total_changed == 0 and total_failed == 0:
            print("✅ No updates across all clusters/resources.")
            print()
          else:
            for cluster in sorted(grouped):
              entries = sorted(grouped[cluster], key=lambda entry: entry["resource"])
              changed = sum(1 for entry in entries if entry["status"] == "changed")
              no_change = sum(1 for entry in entries if entry["status"] == "no-change")
              failed = sum(1 for entry in entries if entry["status"] == "failed")

              if changed == 0 and failed == 0:
                print(f"- Cluster `{cluster}`: ✅ no updates")
                print()
                continue

              print(f"### Cluster: `{cluster}` ({len(entries)} resources: {changed} changed, {no_change} no-change, {failed} failed)")
              print()

              for entry in entries:
                resource = entry["resource"]
                status = entry["status"]
                if status == "no-change":
                  print(f"- Resource `{resource}`: ✅ no updates")
                elif status == "failed":
                  print(f"<details><summary>Resource `{resource}`: ❌ diff failed</summary>")
                  print()
                  print("Please inspect workflow logs for the `flux-local diff` step.")
                  print()
                  print("</details>")
                else:
                  print(f"<details><summary>Resource `{resource}`: ⚠️ updates detected</summary>")
                  print()
                  print("```diff")
                  print(entry["diff"].rstrip())
                  print("```")
                  print()
                  print("</details>")
              print()
          PYEOF
          {
            echo "body<<EOF"
            python3 build_comment.py
            echo
            echo "[Open workflow logs](${RUN_URL})"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Upload combined result to action summary
        run: |
          {
            echo "${{ steps.build_comment.outputs.body }}"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Comment combined diff on PR
        if: ${{ github.event_name == 'pull_request' }}
        uses: mshick/add-pr-comment@8e4927817251f1ff60c001f04568532b38e0b4a0 # v3
        with:
          repo-token: ${{ steps.app-token.outputs.token }}
          message-id: flux-local/${{ github.event.pull_request.number }}/combined
          message-failure: Unable to post flux-local diff comment
          message: ${{ steps.build_comment.outputs.body }}
