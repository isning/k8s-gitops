apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: clirelay
  labels:
    app: clirelay
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: default-gateway
  hostnames:
    - "clirelay.isning.moe"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: clirelay
          port: 8317
