---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: napcat-oauth2-auth
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: default-gateway
  action: ALLOW
  rules:
    - from:
        - source:
            requestPrincipals:
              - "*"
      to:
        - operation:
            hosts:
              - napcat.isning.moe
            notPaths:
              - /oauth2/*
      when:
        - key: request.auth.claims[roles]
          values:
            - napcat:admin
