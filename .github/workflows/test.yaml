name: test

# Copy from https://github.com/fluxcd/flux2-kustomize-helm-example/blob/main/.github/workflows/test.yaml

on:
  workflow_dispatch:
  pull_request:
    branches: 
      - 'main'
  merge_group:
    branches: 
      - 'main'
  push:
    branches: 
      - 'main'
      - '!ci/auto-update-lock/**'
    tags-ignore: [ '*' ]

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      archive_related: ${{ steps.filter.outputs.archive_related }}
      gitops_related: ${{ steps.filter.outputs.gitops_related }}
      terraform_related: ${{ steps.filter.outputs.terraform_related }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Detect archive-related changes
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        with:
          filters: |
            archive_related:
              - '.github/workflows/**'
              - 'lib/mkMultiArchImageArchive.nix'
              - 'scripts/test-mk-multiarch-archive.sh'
            gitops_related:
              - '.github/workflows/**'
              - 'infra/**'
              - 'apps/**'
              - 'vms/**'
              - 'clusters/**'
            terraform_related:
              - '.github/workflows/**'
              - '**/*.tf'
              - '**/*.tfvars'
              - '**/*.tfvars.json'

  terraform-validate:
    if:  ${{ needs.changes.outputs.terraform_related == 'true' }}
    needs:
      - changes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@fc711fa910b93cba0f3fbecaafc9f42fd0c411cb # v2
      - name: Validate Terraform/OpenTofu configs
        shell: bash
        run: |
          set -euo pipefail

          echo "Discovering Terraform/OpenTofu directories..."
          mapfile -t tf_dirs < <(find . -type f -name '*.tf' -print0 | xargs -0 -r -n1 dirname | sort -u) || true
          echo "Detected ${#tf_dirs[@]} Terraform directory(ies)."

          if [[ ${#tf_dirs[@]} -eq 0 ]]; then
            echo "No Terraform/OpenTofu directories found."
            exit 0
          fi

          for dir in "${tf_dirs[@]}"; do
            echo "::group::Validate $dir"
            tofu -chdir="$dir" init -backend=false -input=false -no-color
            tofu -chdir="$dir" validate -no-color
            echo "::endgroup::"
          done

  archive-hash-regression:
    if:  ${{ needs.changes.outputs.archive_related == 'true' }}
    needs:
      - changes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      - name: Setup Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39 # v13
      - name: Install and start containerd
        run: |
          sudo apt-get update
          sudo apt-get install -y containerd
          sudo systemctl enable --now containerd
          sudo systemctl is-active --quiet containerd
      - name: Verify containerd health
        run: |
          sudo ctr version
      - name: Run archive hash regression test
        env:
          CONTAINERD_ADDRESS: /run/containerd/containerd.sock
        run: bash ./scripts/test-mk-multiarch-archive.sh

  manifests:
    if:  ${{ needs.changes.outputs.gitops_related == 'true' }}
    needs:
      - changes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup yq
        uses: fluxcd/pkg/actions/yq@f3ad4b56adec90eb5661af565cdebec997ad4bfb # main
      - name: Setup kubeconform
        uses: fluxcd/pkg/actions/kubeconform@f3ad4b56adec90eb5661af565cdebec997ad4bfb # main
      - name: Setup kustomize
        uses: fluxcd/pkg/actions/kustomize@f3ad4b56adec90eb5661af565cdebec997ad4bfb # main
      - name: Validate manifests
        run: ./scripts/validate.sh
        env:
          # Set to 'true' to fail CI when schema is missing.
          STRICT_MISSING_SCHEMAS: "false"

  flux-local-test:
    if:  ${{ needs.changes.outputs.gitops_related == 'true' }}
    needs:
      - changes
    runs-on: ubuntu-latest
    strategy:
      matrix:
        cluster:
          - kubevirt-lab-1
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@1fd61a06264d71cf445ed55c4f14d401d26a1c64 # v2.8.8
      - name: Setup kustomize
        uses: fluxcd/pkg/actions/kustomize@f3ad4b56adec90eb5661af565cdebec997ad4bfb # main
      - name: flux-local test
        uses: allenporter/flux-local/action/test@4d666add25002f550dc0dbe8b2b2f25859169b34 # 8.2.0
        with:
          path: clusters/${{ matrix.cluster }}
          enable-helm: true

  flux-local-diff:
    if:  ${{ needs.changes.outputs.gitops_related == 'true' }}
    needs:
      - changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        cluster:
          - kubevirt-lab-1
        resource:
          - kustomization
          - helmrelease
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@1fd61a06264d71cf445ed55c4f14d401d26a1c64 # v2.8.8
      - name: Setup kustomize
        uses: fluxcd/pkg/actions/kustomize@f3ad4b56adec90eb5661af565cdebec997ad4bfb # main
      - name: flux-local diff
        id: diff
        uses: allenporter/flux-local/action/diff@4d666add25002f550dc0dbe8b2b2f25859169b34 # 8.2.0
        continue-on-error: true
        with:
          live-branch: main
          path: clusters/${{ matrix.cluster }}
          resource: ${{ matrix.resource }}
      - name: Write diff artifact payload
        if: ${{ always() }}
        env:
          CLUSTER: ${{ matrix.cluster }}
          RESOURCE: ${{ matrix.resource }}
          DIFF_OUTCOME: ${{ steps.diff.outcome }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/attempts/${{ github.run_attempt }}
        run: |
          mkdir -p artifacts
          python3 - <<'PY'
          import json
          import os

          diff_path = os.path.join(os.environ["GITHUB_WORKSPACE"], "diff.patch")
          diff = ""
          if os.path.exists(diff_path):
              with open(diff_path, encoding="utf-8") as f:
                  diff = f.read()

          payload = {
            "cluster": os.environ["CLUSTER"],
            "resource": os.environ["RESOURCE"],
            "outcome": os.environ["DIFF_OUTCOME"],
            "diff": diff,
            "run_url": os.environ["RUN_URL"],
          }

          with open(os.path.join("artifacts", f"diff-{payload['cluster']}-{payload['resource']}.json"), "w", encoding="utf-8") as handle:
            json.dump(payload, handle)
          PY
      - name: Upload diff artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: flux-local-diff-${{ matrix.cluster }}-${{ matrix.resource }}
          path: artifacts/diff-${{ matrix.cluster }}-${{ matrix.resource }}.json
          if-no-files-found: error
      - name: Fail job if diff failed
        if: ${{ steps.diff.outcome != 'success' }}
        run: |
          echo "flux-local diff failed for resource=${{ matrix.resource }}"
          exit 1

  aggregate-comment:
    needs: flux-local-diff
    if: |
      always() && 
      needs.flux-local-diff.result != 'skipped'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Create GitHub App token
        id: app-token
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - name: Download diff artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts
          pattern: flux-local-diff-*
          merge-multiple: true
      - name: Build combined PR comment
        id: build_comment
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/attempts/${{ github.run_attempt }}
        run: |
          cat > build_comment.py <<'PYEOF'
          import glob
          import json
          import os
          from collections import defaultdict

          files = sorted(glob.glob("artifacts/**/*.json", recursive=True))
          grouped = defaultdict(list)
          total_resources = 0
          total_changed = 0
          total_no_change = 0
          total_failed = 0

          for file_path in files:
            with open(file_path, "r", encoding="utf-8") as handle:
              item = json.load(handle)
            cluster = item.get("cluster", "unknown")
            resource = item.get("resource", "unknown")
            outcome = item.get("outcome", "failure")
            diff = item.get("diff", "") or ""
            has_diff = bool(diff.strip())

            status = "failed"
            if outcome == "success":
              status = "changed" if has_diff else "no-change"

            grouped[cluster].append({
              "resource": resource,
              "status": status,
              "diff": diff,
            })

            total_resources += 1
            if status == "changed":
              total_changed += 1
            elif status == "no-change":
              total_no_change += 1
            else:
              total_failed += 1

          short_sha = os.environ["GITHUB_SHA"][:7]
          body = "## flux-local diff summary\n"
          body += f"\nCommit: `{short_sha}` | Clusters: {len(grouped)} | Resources: {total_resources}\n"
          body += f"Changed: {total_changed} | No change: {total_no_change} | Failed: {total_failed}\n"

          if not grouped:
            body += "\nNo matrix diff artifacts were found.\n"
          elif total_changed == 0 and total_failed == 0:
            body += "\n✅ No updates across all clusters/resources.\n"
          else:
            for cluster in sorted(grouped):
              entries = sorted(grouped[cluster], key=lambda entry: entry["resource"])
              changed = sum(1 for entry in entries if entry["status"] == "changed")
              no_change = sum(1 for entry in entries if entry["status"] == "no-change")
              failed = sum(1 for entry in entries if entry["status"] == "failed")

              if changed == 0 and failed == 0:
                body += f"\n- Cluster `{cluster}`: ✅ no updates\n"
                continue

              body += f"\n### Cluster: `{cluster}` ({len(entries)} resources: {changed} changed, {no_change} no-change, {failed} failed)\n"

              for entry in entries:
                resource = entry["resource"]
                status = entry["status"]
                if status == "no-change":
                  body += f"\n- Resource `{resource}`: ✅ no updates\n"
                elif status == "failed":
                  body += f"\n<details><summary>Resource `{resource}`: ❌ diff failed</summary>\n\n"
                  body += "Please inspect workflow logs for the `flux-local diff` step.\n\n</details>\n"
                else:
                  body += f"\n<details><summary>Resource `{resource}`: ⚠️ updates detected</summary>\n\n"
                  body += "```diff\n"
                  body += entry["diff"].rstrip() + "\n"
                  body += "```\n\n</details>\n"

          run_url = os.environ["RUN_URL"]
          body += f"\n[Open workflow logs]({run_url})\n"

          # Write to both GITHUB_OUTPUT and a file
          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"body<<EOF\n{body}\nEOF\n")
          with open("pr_comment.md", "w", encoding="utf-8") as f:
              f.write(body)
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as summary:
              summary.write(body)
          PYEOF
          python3 build_comment.py
      - name: Comment combined diff on PR
        if: ${{ github.event_name == 'pull_request' }}
        uses: mshick/add-pr-comment@8e4927817251f1ff60c001f04568532b38e0b4a0 # v3
        with:
          repo-token: ${{ steps.app-token.outputs.token }}
          message-id: flux-local/${{ github.event.pull_request.number }}/combined
          message-failure: Unable to post flux-local diff comment
          message-path: pr_comment.md
