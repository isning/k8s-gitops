apiVersion: networking.cfargotunnel.com/v1alpha2
kind: Tunnel
metadata:
  name: default-tunnel
  namespace: cloudflare-operator-system
spec:
  cloudflare:
    email: isning_sf@outlook.com
    domain: isning.moe
    secret: default-tunnel-secret
    accountId: 0fa2f8672cf2637118d8cfee9fe6b95f
  deployPatch: |
    spec:
      replicas: 1
      template:
        spec:
          containers:
            - name: cloudflared
              args:
                - tunnel
                - --config
                - /etc/cloudflared/config/config.yaml
                - --metrics
                - 0.0.0.0:2000
                - run
              image: cloudflare/cloudflared:2026.6.1@sha256:6d91c121b803126f7a5344005d17a9324788fc09d305b6e2560ec6040a7ae283
              env:
                - name: TUNNEL_TRANSPORT_PROTOCOL
                  value: "http2"
                - name: TUNNEL_EDGE_IP_VERSION
                  value: "4"
              resources:
                requests:
                  cpu: 10m
                  memory: 16Mi
                limits:
                  cpu: 100m
                  memory: 256Mi

