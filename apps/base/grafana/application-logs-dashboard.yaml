apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: kubernetes-logs
  labels:
    dashboards: grafana
spec:
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  json: >
    {
      "title": "Application Logs",
      "uid": "application-logs",
      "tags": ["logging", "loki"],
      "timezone": "browser",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "panels": [
        {
          "id": 1,
          "title": "Log Stream",
          "type": "logs",
          "gridPos": {"h": 12, "w": 24, "x": 0, "y": 0},
          "targets": [
            {
              "expr": "{app=\".+\"}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "title": "Error Logs",
          "type": "logs",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 12},
          "targets": [
            {
              "expr": "{app=\".+\"} | level=\"error\"",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "title": "Log Volume by App",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 12},
          "targets": [
            {
              "expr": "sum(rate({app=\".+\"}[5m])) by (app)",
              "legendFormat": "{{app}}",
              "refId": "A"
            }
          ]
        }
      ]
    }