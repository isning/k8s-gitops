name: Build Tofu Runner Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "images/tofu-runner/**"
      - "tf/versions.tf"
      - ".github/workflows/build-tofu-runner.yaml"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd #v4

      - name: Login to GHCR
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          image="ghcr.io/isning/k8s-gitops/tf-runner"
          date_tag="$(date -u +%Y%m%d%H%M)"
          dated_tag="v0.16.3-custom-${date_tag}"

          {
            echo "image=$image"
            echo "dated_tag=$dated_tag"
            echo "sha_tag=sha-${GITHUB_SHA::12}"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f #v7
        with:
          context: images/tofu-runner
          file: images/tofu-runner/Dockerfile
          build-contexts: |
            repo=.
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.tags.outputs.image }}:${{ steps.tags.outputs.dated_tag }}
            ${{ steps.tags.outputs.image }}:${{ steps.tags.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
