apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: clirelay-manage
  labels:
    app: clirelay
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: default-gateway
  hostnames:
    - "clirelay.isning.moe"
  rules:
    - matches:
        - path:
            type: Exact
            value: /
      filters:
        - type: RequestRedirect
          requestRedirect:
            path:
              type: ReplaceFullPath
              replaceFullPath: /manage
    - matches:
        - path:
            type: PathPrefix
            value: /manage
      backendRefs:
        - name: clirelay
          port: 8317
    - matches:
        - path:
            type: PathPrefix
            value: /v0/management
      backendRefs:
        - name: clirelay
          port: 8317
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: clirelay-api
  labels:
    app: clirelay
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: default-gateway
  hostnames:
    - "llm.isning.moe"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v1
      backendRefs:
        - name: clirelay
          port: 8317
    - matches:
        - path:
            type: PathPrefix
            value: /api/provider
      backendRefs:
        - name: clirelay
          port: 8317
