---
apiVersion: security.istio.io/v1
kind: RequestAuthentication
metadata:
  name: oauth2-gateway-jwt
  namespace: kube-system
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: infra-gateway
  jwtRules:
    - issuer: https://logto.isning.moe/oidc
      audiences:
        - m8rwqva1rsy9p2b3tbsad
      forwardOriginalToken: false
      fromHeaders:
        - name: X-OAuth2-Gateway-Id-Token
