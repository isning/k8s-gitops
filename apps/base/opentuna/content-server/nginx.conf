server {
    listen 80;
    server_name _;

    root /mnt/efs;
    index index.html index.htm;

    # Enable directory listing
    autoindex on;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Mirror content locations
    location / {
        try_files $uri $uri/ =404;
    }

    # Debian mirrors
    location /debian/ {
        alias /mnt/efs/debian/;
    }

    location /debian-security/ {
        alias /mnt/efs/debian-security/;
    }

    # Ubuntu mirrors
    location /ubuntu/ {
        alias /mnt/efs/ubuntu/;
    }

    # Static files
    location /static/ {
        alias /mnt/efs/static/;
    }

    # Health check
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
