apiVersion: apps/v1
kind: Deployment
metadata:
  name: napcat
  labels:
    app: napcat
spec:
  replicas: 1
  strategy:
    type: Recreate # Use Recreate strategy for stateful applications
  selector:
    matchLabels:
      app: napcat
  template:
    metadata:
      labels:
        app: napcat
    spec:
      # 设置固定主机名，避免 Pod 重启后主机名变化触发风控
      hostname: napcat-host
      subdomain: napcat
      # 优雅关闭时间，给 NapCat 足够时间保存状态
      terminationGracePeriodSeconds: 60

      # 初始化容器：首次生成随机 machine-id，后续复用
      initContainers:
        - name: init-machine-id
          image: busybox:1.37.0
          command:
            - /bin/sh
            - -c
            - |
              # 仅在 machine-id 不存在时随机生成一个
              if [ ! -f /machine-id-data/machine-id ]; then
                # 使用 /dev/urandom 生成随机 UUID (32位十六进制)
                cat /proc/sys/kernel/random/uuid | tr -d '-' > /machine-id-data/machine-id
                echo "Machine ID generated: $(cat /machine-id-data/machine-id)"
              else
                echo "Machine ID exists: $(cat /machine-id-data/machine-id)"
              fi
          volumeMounts:
            - name: machine-id-data
              mountPath: /machine-id-data
        - name: setup-onebot-config
          image: mikefarah/yq:4
          command:
          - /bin/sh
          - -c
          - |
            filenames=$(yq 'keys | .[]' /tmp/onebot/configs.json)
            
            for filename in $filenames; do
              yq -o=json ".[ \"$filename\" ]" /tmp/onebot/configs.json > "/config/$filename"
              echo "✓ OneBot config created: $filename"
            done
            
            echo "Files in /config:"
            ls -lah /config/
          volumeMounts:
            - name: onebot-config
              mountPath: /tmp/onebot
              readOnly: true
            - name: napcat-config
              mountPath: /config
      
      containers:
        - name: napcat
          image: ghcr.io/isning/docker.io/mlikiowa/napcat-docker:latest
          imagePullPolicy: Always
          env:
            - name: NAPCAT_UID
              value: "1000"
            - name: NAPCAT_GID
              value: "1000"
            - name: TZ
              value: "Asia/Shanghai"
            - name: ACCOUNT
              valueFrom:
                secretKeyRef:
                  name: napcat-secret
                  key: account
          ports:
            - containerPort: 6099
              name: napcat-web
          resources:
            requests:
              memory: "64Mi"
              cpu: "10m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          volumeMounts:
            - name: napcat-config
              mountPath: /app/napcat/config
            - name: webui-config
              mountPath: /app/napcat/config/webui.json
              subPath: webui.json
              readOnly: true
            - name: napcat-qq
              mountPath: /app/.config/QQ
            - name: machine-id-data
              mountPath: /etc/machine-id
              subPath: machine-id
              readOnly: true
            - name: localtime
              mountPath: /etc/localtime
              readOnly: true

      volumes:
        - name: napcat-config
          persistentVolumeClaim:
            claimName: napcat-config-pvc
        - name: webui-config
          configMap:
            name: napcat-webui-config
        - name: onebot-config
          secret:
            secretName: napcat-onebot-config
        - name: napcat-qq
          persistentVolumeClaim:
            claimName: napcat-qq-pvc
        - name: machine-id-data
          persistentVolumeClaim:
            claimName: napcat-machine-id-pvc
        - name: localtime
          hostPath:
            path: /etc/localtime
            type: File
