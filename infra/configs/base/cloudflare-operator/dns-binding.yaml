apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: cloudflare-tunnel-dns-binding
  namespace: cloudflare-operator-system
spec:
  endpoints:
    # MUST be patched
  - dnsName: "clustername.ingress.cfd.isning.moe"
    recordType: CNAME
    targets:
    - 84bf09ad-68e3-4445-ae54-264d0088090a.cfargotunnel.com
  - dnsName: "prod.ingress.cfd.isning.moe"
    recordType: CNAME
    targets:
    - 84bf09ad-68e3-4445-ae54-264d0088090a.cfargotunnel.com
  - dnsName: "staging.ingress.cfd.isning.moe"
    recordType: CNAME
    targets:
    - 84bf09ad-68e3-4445-ae54-264d0088090a.cfargotunnel.com
