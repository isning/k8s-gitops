apiVersion: networking.cfargotunnel.com/v1alpha2
kind: Tunnel
metadata:
  name: default-tunnel
  namespace: cloudflare-operator-system
spec:
  cloudflare:
    email: isning_sf@outlook.com
    domain: isning.moe
    secret: default-tunnel-secret
    accountId: 0fa2f8672cf2637118d8cfee9fe6b95f
  deployPatch: |
    spec:
      replicas: 1
      template:
        spec:
          containers:
            - name: cloudflared
              args:
                - tunnel
                - --config
                - /etc/cloudflared/config/config.yaml
                - --metrics
                - 0.0.0.0:2000
                - run
              image: cloudflare/cloudflared:2026.5.1@sha256:a5b5e6fd9a372f054b9a843c219bfbcdceb54691605312a8b1ee72978bdf1aa1
              env:
                - name: TUNNEL_TRANSPORT_PROTOCOL
                  value: "http2"
                - name: TUNNEL_EDGE_IP_VERSION
                  value: "4"
              resources:
                requests:
                  cpu: 10m
                  memory: 16Mi
                limits:
                  cpu: 100m
                  memory: 256Mi

