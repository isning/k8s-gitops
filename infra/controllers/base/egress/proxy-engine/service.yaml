---
apiVersion: v1
kind: Service
metadata:
  name: proxy-svc
  namespace: egress-system
  labels:
    app: proxy-engine
spec:
  ports:
  - port: 7890
    name: http-proxy
    appProtocol: http
    protocol: TCP
    targetPort: 7890
  - port: 8080
    name: metrics
    protocol: TCP
    targetPort: 8080
  selector:
    app: proxy-engine
