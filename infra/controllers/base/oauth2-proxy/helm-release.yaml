---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: oauth2-proxy
  namespace: oauth2-proxy
spec:
  releaseName: oauth2-proxy
  interval: 30m
  chart:
    spec:
      chart: oauth2-proxy
      sourceRef:
        kind: HelmRepository
        name: oauth2-proxy
        namespace: flux-system
      interval: 12h
      version: "10.4.2"
  values:
    replicaCount: 1
    config:
      forceLegacyConfig: false
      existingSecret: oauth2-proxy-secrets
      emailDomains:
        - "*"
    alphaConfig:
      enabled: true
      configData:
        upstreamConfig:
          upstreams:
            - id: default
              path: /
              static: true
              staticCode: 200
        providers:
          - id: oidc
            provider: oidc
            clientID: ${OAUTH2_PROXY_CLIENT_ID}
            clientSecret: ${OAUTH2_PROXY_CLIENT_SECRET}
            scope: openid profile email roles
            additionalClaims:
              - roles
            oidcConfig:
              issuerURL: https://logto.isning.moe/oidc
              groupsClaim: roles
        injectResponseHeaders:
          - name: X-OAuth2-Gateway-User
            values:
              - claim: preferred_username
          - name: X-OAuth2-Gateway-Email
            values:
              - claim: email
          - name: X-OAuth2-Gateway-Groups
            values:
              - claim: roles
          - name: X-OAuth2-Gateway-Id-Token
            values:
              - claim: id_token
          - name: X-OAuth2-Gateway-Access-Token
            values:
              - claim: access_token

    extraArgs:
      redirect-url: "https://oauth-gateway.isning.moe/oauth2/callback"
      reverse-proxy: "true"
      skip-provider-button: "true"
      cookie-secure: "true"
      cookie-samesite: "lax"
      cookie-domain: ".isning.moe"
      whitelist-domain: ".isning.moe"
    extraEnv:
      - name: OAUTH2_PROXY_CLIENT_ID
        valueFrom:
          secretKeyRef:
            name: oauth2-proxy-secrets
            key: client-id
      - name: OAUTH2_PROXY_CLIENT_SECRET
        valueFrom:
          secretKeyRef:
            name: oauth2-proxy-secrets
            key: client-secret
      - name: OAUTH2_PROXY_COOKIE_SECRET
        valueFrom:
          secretKeyRef:
            name: oauth2-proxy-secrets
            key: cookie-secret
    resources:
      requests:
        cpu: "10m"
        memory: "64Mi"
      limits:
        memory: "256Mi"
    podSecurityContext:
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
    securityContext:
      enabled: true
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL
