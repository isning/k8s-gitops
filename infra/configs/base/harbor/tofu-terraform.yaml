---
apiVersion: infra.contrib.fluxcd.io/v1alpha2
kind: Terraform
metadata:
  name: harbor-proxy-cache
  namespace: harbor
spec:
  interval: 30m
  approvePlan: auto
  path: ./infra/configs/base/harbor/tf
  sourceRef:
    kind: GitRepository
    name: harbor-config
  retryInterval: 1m
  runnerPodTemplate:
    spec:
      env:
        - name: TF_VAR_harbor_username
          value: admin
        - name: TF_VAR_harbor_password
          valueFrom:
            secretKeyRef:
              name: harbor-admin-auth
              key: HARBOR_ADMIN_PASSWORD
        - name: TF_VAR_robot_account_k8s_secret
          valueFrom:
            secretKeyRef:
              name: harbor-k8s-robot-account-auth
              key: password
