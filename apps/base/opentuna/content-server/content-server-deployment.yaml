apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: opentuna-efs-pvc
  namespace: opentuna
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: local-path-critical
  resources:
    requests:
      storage: 100Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opentuna-content-server
  namespace: opentuna
  labels:
    app: opentuna-content-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: opentuna-content-server
  template:
    metadata:
      labels:
        app: opentuna-content-server
    spec:
      nodeSelector:
        opentuna.isning.moe/node-role: mirror
      tolerations:
        - key: opentuna.isning.moe/mirror
          operator: Equal
          value: "true"
          effect: NoSchedule
      containers:
        - name: nginx
          image: nginx:1.18-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: efs-storage
              mountPath: /mnt/efs
              readOnly: true
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/opentuna.conf
              subPath: nginx.conf
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: efs-storage
          persistentVolumeClaim:
            claimName: opentuna-efs-pvc
        - name: nginx-conf
          configMap:
            name: opentuna-nginx-conf
---
apiVersion: v1
kind: Service
metadata:
  name: opentuna-content-server
  namespace: opentuna
  labels:
    app: opentuna-content-server
spec:
  selector:
    app: opentuna-content-server
  ports:
    - name: http
      port: 80
      targetPort: 80
  type: ClusterIP
