name: Update Image Lock

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      cluster:
        description: "Cluster name under clusters/ (or 'all')"
        required: true
        default: "all"
      arch:
        description: "Container architecture"
        required: true
        default: "amd64"
      os:
        description: "Container OS"
        required: true
        default: "linux"
      registry_mirror_map:
        description: "JSON mapping of registry to mirror(s) (e.g. {\"docker.io\":[\"dockerproxy.net\",\"mirror.gcr.io\"]})"
        required: false
        default: ""
      mirror_retries:
        description: "Retry attempts per mirror source"
        required: false
        default: "3"
      ignore_cache:
        description: "Ignore cache and force rebuild archive hashes"
        required: false
        default: "false"
      clean_cache:
        description: "Clean local image hash cache before running"
        required: false
        default: "false"

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Get GitHub App User ID
        id: get-user-id
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"

      - name: Checkout PR branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Setup Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39 # v13

      - name: Cache uv tools
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv

      - name: Restore image digest/archive-hash cache
        if: ${{ github.event.inputs.ignore_cache != 'true' && github.event.inputs.clean_cache != 'true' }}
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cache/nixos-image-lock
          key: ${{ runner.os }}-nixos-image-lock-${{ github.event.inputs.arch || 'amd64' }}-${{ github.event.inputs.os || 'linux' }}-v1-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            ${{ runner.os }}-nixos-image-lock-${{ github.event.inputs.arch || 'amd64' }}-${{ github.event.inputs.os || 'linux' }}-v1-

      - name: Clean image digest/archive-hash cache
        if: ${{ github.event.inputs.clean_cache == 'true' }}
        run: |
          rm -rf ~/.cache/nixos-image-lock
          mkdir -p ~/.cache/nixos-image-lock

      - name: Generate lock
        run: |
          COMMIT_MSG_FILE="${{ github.workspace }}/pr_commit_msg.txt"
          REPORT_PATH="${{ github.workspace }}/pr_report.md"

          cluster="${{ github.event.inputs.cluster || 'all' }}"
          arch="${{ github.event.inputs.arch || 'amd64' }}"
          os="${{ github.event.inputs.os || 'linux' }}"
          registry_mirror_map='${{ github.event.inputs.registry_mirror_map || '' }}'
          mirror_retries='${{ github.event.inputs.mirror_retries || '3' }}'
          ignore_cache='${{ github.event.inputs.ignore_cache || 'false' }}'
          clean_cache='${{ github.event.inputs.clean_cache || 'false' }}'
          common_args=(--arch "$arch" --os "$os" --verbose --commit-msg-file "$COMMIT_MSG_FILE" --report-file "$REPORT_PATH")

          if [[ -n "$registry_mirror_map" ]]; then
            common_args+=(--registry-mirror-map "$registry_mirror_map")
          fi
          common_args+=(--mirror-retries "$mirror_retries")
          if [[ "$ignore_cache" == "true" ]]; then
            common_args+=(--ignore-cache)
          fi
          if [[ "$clean_cache" == "true" ]]; then
            echo "[ci] clean_cache enabled: local cache directory was reset"
          fi

          if [[ "$cluster" == "all" ]]; then
            nix run .#gen-image-lock-all -- "${common_args[@]}"
          else
            nix run .#gen-image-lock -- --cluster "$cluster" "${common_args[@]}"
          fi

      - name: Save image digest/archive-hash cache
        if: always() && !cancelled() && github.event.inputs.ignore_cache != 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cache/nixos-image-lock
          key: ${{ runner.os }}-nixos-image-lock-${{ github.event.inputs.arch || 'amd64' }}-${{ github.event.inputs.os || 'linux' }}-v1-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Set Commit Message Output
        id: msg_output
        run: |
          if [[ -f ${{ github.workspace }}/pr_commit_msg.txt ]]; then
            {
              echo "COMMIT_MSG<<EOF"
              cat ${{ github.workspace }}/pr_commit_msg.txt
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "COMMIT_MSG=chore(lock): no image changes detected" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: ${{ steps.msg_output.outputs.COMMIT_MSG }}
          committer: ${{ steps.app-token.outputs.app-slug }}[bot] <${{ steps.get-user-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com>
          author: ${{ steps.app-token.outputs.app-slug }}[bot] <${{ steps.get-user-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com>
          title: "chore(lock): refresh flux image lock"
          body-path: ${{ github.workspace }}/pr_report.md
          branch: ci/auto-update-lock/${{ github.run_id }}
          base: main
          delete-branch: true
          add-paths: |
            clusters/**/images.lock.nix

      - name: Force Merge PR
        if: steps.cpr.outputs.pull-request-operation == 'created'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          PR_NUMBER="${{ steps.cpr.outputs.pull-request-number }}"
          echo "Using bypass privileges to squash merge PR #$PR_NUMBER..."

          gh pr merge "$PR_NUMBER" --squash --admin
