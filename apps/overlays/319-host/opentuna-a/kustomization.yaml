---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: opentuna-a
nameSuffix: -a
commonLabels:
  opentuna.isning.moe/scheme: a
resources:
  - ./../../../base/opentuna/
patches:
  - target:
      group: gateway.networking.k8s.io
      version: v1
      kind: HTTPRoute
      name: opentuna
    patch: |-
      - op: replace
        path: /spec/hostnames/0
        value: opentuna-a.local
