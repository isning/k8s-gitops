---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tofu-controller
  namespace: flux-system
spec:
  releaseName: tofu-controller
  interval: 30m
  chart:
    spec:
      chart: tofu-controller
      sourceRef:
        kind: HelmRepository
        name: tofu-controller
        namespace: flux-system
      version: ">=0.16.2"
      interval: 12h
  install:
    crds: Create
    remediation:
      retries: -1
  upgrade:
    crds: CreateReplace
    remediation:
      retries: -1
  values:
    image:
      tag: v0.16.2
    runner:
      image:
        tag: v0.16.2
      serviceAccount:
        allowedNamespaces:
          - flux-system
          - harbor
