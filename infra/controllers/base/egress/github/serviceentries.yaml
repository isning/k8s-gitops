apiVersion: networking.istio.io/v1
kind: ServiceEntry
metadata:
  name: github-others
  namespace: egress-system
spec:
  exportTo: ["*"]
  hosts:
    - api.github.com
    - github.githubassets.com
    - raw.githubusercontent.com
    - objects.githubusercontent.com
  location: MESH_EXTERNAL
  ports:
    - number: 443
      name: https
      protocol: TLS
  resolution: DNS
---
apiVersion: networking.istio.io/v1
kind: ServiceEntry
metadata:
  name: encapsulated-https-api.github.com
  namespace: egress-system
spec:
  exportTo: ["."]
  hosts:
    - api.github.com.encapsulated-https.egress-gateway.mesh.internal
  location: MESH_INTERNAL
  ports:
    - number: 443
      name: https
      protocol: TLS
  resolution: DNS
  endpoints:
    - address: proxy-svc.egress-system.svc.cluster.local
      ports:
        https: 7890
---
