apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: inject-connect-tunnel-api-github-com
  namespace: egress-system
spec:
  host: api.github.com
  exportTo: ["*"]
  trafficPolicy:
    tunnel:
      protocol: CONNECT
      targetHost: proxy-svc.egress-system.svc.cluster.local
      targetPort: 7890
  workloadSelector:
    labels:
      gateway.networking.k8s.io/gateway-name: https-egress-gateway
---
