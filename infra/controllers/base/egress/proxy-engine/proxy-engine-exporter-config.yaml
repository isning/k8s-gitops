apiVersion: v1
kind: ConfigMap
metadata:
  name: proxy-engine-exporter-config
  namespace: egress-system
data:
  exporter.py: |
    """
    Sing-box Prometheus exporter.

    Polls the sing-box Clash-compatible REST API (/proxies) and exposes a
    Prometheus gauge for every URLTest group that is currently routing through
    the "direct" outbound – which means ALL proxy nodes in that group have
    failed their URL-test health check.

    Metric:
      singbox_group_direct_fallback{group="<name>"} 1.0  →  all proxies unhealthy
      singbox_group_direct_fallback{group="<name>"} 0.0  →  at least one proxy healthy
    """
    import json
    import time
    import threading
    import urllib.request
    from http.server import HTTPServer, BaseHTTPRequestHandler

    CLASH_API    = "http://127.0.0.1:9090"
    METRICS_PORT = 8080
    POLL_INTERVAL = 30  # seconds

    _lock    = threading.Lock()
    _metrics = {}   # group_name -> 0|1

    def _poll():
        while True:
            try:
                req = urllib.request.Request(f"{CLASH_API}/proxies")
                with urllib.request.urlopen(req, timeout=5) as resp:
                    data = json.loads(resp.read())
                snapshot = {}
                for name, proxy in data.get("proxies", {}).items():
                    if proxy.get("type") in ("URLTest", "Fallback", "LoadBalance"):
                        now = proxy.get("now", "")
                        snapshot[name] = 1 if now == "direct" else 0
                with _lock:
                    _metrics.clear()
                    _metrics.update(snapshot)
            except Exception as e:
                print(f"[exporter] Error polling Clash API: {e}", flush=True)
            time.sleep(POLL_INTERVAL)

    class _Handler(BaseHTTPRequestHandler):
        def do_GET(self):
            if self.path != "/metrics":
                self.send_response(404)
                self.end_headers()
                return
            lines = [
                "# HELP singbox_group_direct_fallback "
                "1 if the URLTest group's winning outbound is 'direct' "
                "(i.e. all proxy nodes are currently unhealthy), 0 otherwise.",
                "# TYPE singbox_group_direct_fallback gauge",
            ]
            with _lock:
                for group, val in sorted(_metrics.items()):
                    safe = group.replace("\\", "\\\\").replace('"', '\\"')
                    lines.append(f'singbox_group_direct_fallback{{group="{safe}"}} {val}')
            body = "\n".join(lines) + "\n"
            encoded = body.encode("utf-8")
            self.send_response(200)
            self.send_header("Content-Type",
                             "text/plain; version=0.0.4; charset=utf-8")
            self.send_header("Content-Length", str(len(encoded)))
            self.end_headers()
            self.wfile.write(encoded)

        def log_message(self, *_):
            pass  # suppress per-request noise

    if __name__ == "__main__":
        t = threading.Thread(target=_poll, daemon=True)
        t.start()
        print(f"[exporter] Metrics server listening on :{METRICS_PORT}", flush=True)
        HTTPServer(("0.0.0.0", METRICS_PORT), _Handler).serve_forever()
