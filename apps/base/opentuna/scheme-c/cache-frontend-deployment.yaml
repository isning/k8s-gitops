apiVersion: apps/v1
kind: Deployment
metadata:
  name: opentuna-cache-frontend
  namespace: opentuna
  labels:
    app: opentuna-cache-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: opentuna-cache-frontend
  template:
    metadata:
      labels:
        app: opentuna-cache-frontend
    spec:
      nodeSelector:
        opentuna.isning.moe/node-role: mirror
      tolerations:
        - key: opentuna.isning.moe/mirror
          operator: Equal
          value: "true"
          effect: NoSchedule
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
            - name: cache
              mountPath: /var/cache/nginx
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: "300m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
      volumes:
        - name: nginx-conf
          configMap:
            name: opentuna-cache-nginx-conf
        - name: cache
          emptyDir:
            sizeLimit: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: opentuna-cache-frontend
  namespace: opentuna
  labels:
    app: opentuna-cache-frontend
spec:
  selector:
    app: opentuna-cache-frontend
  ports:
    - name: http
      port: 80
      targetPort: http
  type: ClusterIP
