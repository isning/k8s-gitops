apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: metapi-route
  labels:
    app: metapi
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: default-gateway
  hostnames:
    - "llm-dash.isning.moe"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v1
        - path:
            type: PathPrefix
            value: /v1beta
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplaceFullPath
              replaceFullPath: /dummy-404-9f16d2b3-6a7f-4b4c-9f3e-6c2a0f8b1e7f
      backendRefs:
        - name: metapi
          port: 80
    - backendRefs:
        - name: metapi
          port: 80

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: metapi-api
  labels:
    app: metapi
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: default-gateway
  hostnames:
    - "llm.isning.moe"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v1
      backendRefs:
        - name: metapi
          port: 80
    - matches:
        - path:
            type: PathPrefix
            value: /v1beta
      backendRefs:
        - name: metapi
          port: 80
