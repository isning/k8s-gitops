apiVersion: v1
kind: ConfigMap
metadata:
  name: sub-converter-script-config
  namespace: egress-system
data:
  update_sub.py: |
    import os
    import json
    import urllib.request
    import re
    import sys

    # Configuration
    URLS_ENV = os.environ.get('SUB_URLS', '')
    OUTPUT_PATH = '/shared-nodes/nodes.json'
    USER_AGENT = 'sing-box'
    TIMEOUT = 15

    if not URLS_ENV:
        print("Error: SUB_URLS environment variable is empty!")
        sys.exit(1)

    # Parse SUB_URLS into a list of tuples: (sub_tag, sub_url)
    sub_list = []
    for i, item in enumerate(URLS_ENV.split(',')):
        item = item.strip()
        if not item:
            continue
        
        # Check if a custom tag is provided (e.g., sub1:https://...)
        if not item.startswith('http') and ':' in item:
            parts = item.split(':', 1)
            sub_tag = parts[0].strip()
            sub_url = parts[1].strip()
        else:
            # Fallback if no tag is provided
            sub_tag = f"Sub_{i+1}"
            sub_url = item
            
        sub_list.append((sub_tag, sub_url))

    all_nodes = []
    seen_tags = set()

    def get_multiplier(tag):
        """
        Extracts a multiplier suffix from the tag.
        Matches patterns like [0.5x], (2x), or ' 1.5x' (with a preceding space) at the end of the string.
        The multiplier must be preceded by '[', '(' or whitespace.
        """
        match = re.search(r'[\[\(\s]([0-9.]+)x[\]\)]?$', tag, re.IGNORECASE)
        if match:
            try:
                return float(match.group(1))
            except ValueError:
                return 1.0
        return 1.0

    print(f"Starting to process {len(sub_list)} subscriptions...")

    for sub_tag, url in sub_list:
        try:
            req = urllib.request.Request(url, headers={'User-Agent': USER_AGENT})
            with urllib.request.urlopen(req, timeout=TIMEOUT) as resp:
                content = resp.read().decode('utf-8')
                sub_data = json.loads(content)
                
                count = 0
                for node in sub_data.get('outbounds', []):
                    # Basic validation: must have a server and tag
                    if 'server' in node and 'tag' in node:
                        original_tag = node['tag']
                        
                        # Detect Multiplier based on the original name
                        rate = get_multiplier(original_tag)
                        node['multiplier'] = rate
                        
                        # Prepend the subscription tag to the node name
                        tagged_name = f"[{sub_tag}] {original_tag}"
                        
                        # Deduplicate tags
                        final_tag = tagged_name
                        counter = 1
                        while final_tag in seen_tags:
                            final_tag = f"{tagged_name}_{counter}"
                            counter += 1
                        
                        node['tag'] = final_tag
                        seen_tags.add(final_tag)
                        all_nodes.append(node)
                        count += 1
                
                print(f"[{sub_tag}] Successfully fetched {count} nodes.")
        except Exception as e:
            print(f"[{sub_tag}] Failed to fetch subscription. Error: {e}")

    if not all_nodes:
        print("Critical: No nodes were retrieved. Exiting.")
        sys.exit(1)

    # Categorization using Regex
    def filter_nodes(pattern):
        return [n['tag'] for n in all_nodes if re.search(pattern, n['tag'], re.IGNORECASE)]

    groups = {
        "HongKong": r'🇭🇰|HK|Hong Kong|香港',
        "Macau": r'🇲🇨|MC|Macau|澳门',
        "Taiwan": r'🇹🇼|TW|Taiwan|台湾',
        "Singapore": r'🇸🇬|SG|Singapore|狮城|新加坡',
        "UnitedStates": r'🇺🇸|US|America|United States|美国',
        "Japan": r'🇯🇵|JP|Japan|日本',
        "Korea": r'🇰🇷|KR|Korea|韩国',
        "UnitedKingdom": r'🇬🇧|UK|United Kingdom|英国',
        "Germany": r'🇩🇪|DE|Germany|德国'
    }

    def safe_outbounds(group_name, node_list):
        """
        Soft fallback: returns node_list when non-empty, otherwise falls back to ["direct"].
        Use for general-purpose groups (AllNodes, regional, LowRateNodes) where a direct
        connection is acceptable if no proxy nodes are available.
        Emits a warning when the fallback is activated so operators can observe the event.
        """
        if not node_list:
            print(f"Warning: [safe] No nodes found for group '{group_name}'. Falling back to 'direct'.")
        return node_list if node_list else ["direct"]

    def strict_outbounds(group_name, node_list):
        """
        Strict (no-fallback) mode: returns node_list when non-empty, otherwise falls back to ["block"].
        Use for privacy-sensitive groups whose traffic must NEVER reach the real IP
        (e.g. UnitedStates used for Anthropic/Gemini). Blocking instead of direct-routing
        prevents silent IP leakage when no qualifying proxy nodes are available.
        Emits an error when the fallback is activated so operators can observe the event.
        """
        if not node_list:
            print(f"ERROR: [strict] No nodes found for group '{group_name}'. "
                  f"Traffic routed to this group will be BLOCKED to prevent real IP leakage.")
        return node_list if node_list else ["block"]

    # Build Outbounds
    custom_outbounds = []

    # 1. Add all proxy nodes
    custom_outbounds.extend(all_nodes)

    # 2. Add auto-test groups for each region (soft + strict variants).
    # - <GroupName>: soft fallback to ["direct"] with a Warning log.
    # - Strict<GroupName>: hard fallback to ["block"] with an ERROR log; use this for
    #   traffic where a direct connection would leak the real IP (e.g. Anthropic, Gemini).
    for group_name, pattern in groups.items():
        nodes = filter_nodes(pattern)
        custom_outbounds.append({
            "type": "urltest",
            "tag": group_name,
            "outbounds": safe_outbounds(group_name, nodes)
        })
        custom_outbounds.append({
            "type": "urltest",
            "tag": f"Strict{group_name}",
            "outbounds": strict_outbounds(f"Strict{group_name}", nodes)
        })

    # 3. Add Low-Rate group (Multiplier <= 0.5x)
    low_rate_nodes = [n['tag'] for n in all_nodes if n.get('multiplier', 1.0) <= 0.5]
    custom_outbounds.append({
        "type": "urltest",
        "tag": "LowRateNodes",
        "outbounds": safe_outbounds("LowRateNodes", low_rate_nodes)
    })

    # 4a. Global AllNodes (Fastest) UrlTest — soft mode.
    # Always append "direct" as the last member so AllNodes never becomes fully empty
    # at runtime (e.g. when all proxy nodes are temporarily unhealthy). This provides
    # an observable, graceful fallback for DNS routing and other general traffic.
    # NOTE: safe_outbounds() is intentionally NOT used here because "direct" must always
    # be present as the last urltest candidate even when proxy nodes exist, giving sing-box
    # a guaranteed-healthy last resort rather than only a fallback when the list is empty.
    all_node_tags = [n['tag'] for n in all_nodes]
    if not all_node_tags:
        print("Warning: [safe] No proxy nodes available; AllNodes will only contain the 'direct' fallback.")
    custom_outbounds.append({
        "type": "urltest",
        "tag": "AllNodes",
        "outbounds": all_node_tags + ["direct"]
    })

    # 4b. StrictAllNodes — strict mode (no "direct" fallback appended).
    # Use when traffic must not fall back to the real IP even when all proxy nodes fail.
    custom_outbounds.append({
        "type": "urltest",
        "tag": "StrictAllNodes",
        "outbounds": strict_outbounds("StrictAllNodes", all_node_tags)
    })

    final_config = {"outbounds": custom_outbounds}

    # Ensure directory exists
    os.makedirs(os.path.dirname(OUTPUT_PATH), exist_ok=True)

    with open(OUTPUT_PATH, 'w', encoding='utf-8') as f:
        # Optional: remove the 'multiplier' helper key before writing to JSON if sing-box complains
        for ob in final_config["outbounds"]:
            if "multiplier" in ob:
                del ob["multiplier"]
                
        json.dump(final_config, f, indent=2, ensure_ascii=False)

    print(f"\nConfiguration generated successfully!")
    print(f"Total nodes: {len(all_nodes)}")
    print(f"Low-rate nodes detected: {len(low_rate_nodes)}")
    print(f"Output saved to: {OUTPUT_PATH}")
