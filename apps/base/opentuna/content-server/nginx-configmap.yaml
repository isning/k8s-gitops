apiVersion: v1
kind: ConfigMap
metadata:
  name: opentuna-nginx-conf
  namespace: opentuna
data:
  nginx.conf: |
    map $request_uri $cache_policy {
      ~\.(rpm|deb|tar\.zst|tar\.xz)$ 1M;
      ~\/by-hash\/(MD5Sum|SHA256)\/ 1M;
      ~\.(xml|sqlite).*$ 30m;
      ~\.(abs\.tar\.gz|db|db\.tar\.gz|files|files\.tar\.gz|links\.tar\.gz)$ 30m;
      ~(Index|Packages.*|Sources.*|Release.*|InRelease)$ 30m;
      default off;
    }

    log_format opentuna_json escape=json
      '{"time":"$time_iso8601",'
      '"request_id":"$request_id",'
      '"remote_addr":"$remote_addr",'
      '"host":"$host",'
      '"method":"$request_method",'
      '"path":"$uri",'
      '"status":$status,'
      '"bytes_sent":$bytes_sent,'
      '"request_time":$request_time,'
      '"upstream":"$upstream_addr",'
      '"upstream_time":"$upstream_response_time"}';

    server {
        listen 80;
        server_name _;

        root /mnt/efs;
        index index.html index.htm;
        autoindex on;

        access_log /var/log/nginx/access.log opentuna_json;
        error_log /var/log/nginx/error.log;

        add_header X-Request-Id $request_id always;

        location / {
            try_files $uri $uri/ =404;
            expires $cache_policy;
        }

        location /debian/ {
            alias /mnt/efs/debian/;
            expires $cache_policy;
        }

        location /debian-security/ {
            alias /mnt/efs/debian-security/;
            expires $cache_policy;
        }

        location /ubuntu/ {
            alias /mnt/efs/ubuntu/;
            expires $cache_policy;
        }

        location /static/ {
            alias /mnt/efs/static/;
        }

        location /rubygems/ {
            return 404;
        }

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
