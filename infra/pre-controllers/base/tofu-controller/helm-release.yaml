---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tofu-controller
  namespace: flux-system
  annotations:
    image-lock/extra-images: >-
      ghcr.io/isning/k8s-gitops/tf-runner:v0.16.3-custom-202605171200@sha256:5c41d8a6c32df582bd61363febc10aef677042ad0497cdfca61db32c6459738e
spec:
  releaseName: tofu-controller
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: tofu-controller
    namespace: flux-system
  install:
    crds: Create
    remediation:
      retries: -1
  upgrade:
    crds: CreateReplace
    remediation:
      retries: -1
  values:
    runner:
      image:
        repository: ghcr.io/isning/k8s-gitops/tf-runner
        tag: v0.16.3-custom-202605171200@sha256:5c41d8a6c32df582bd61363febc10aef677042ad0497cdfca61db32c6459738e
      serviceAccount:
        allowedNamespaces:
          - flux-system
          - harbor
