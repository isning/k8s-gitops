apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: application-metrics
  labels:
    dashboards: grafana
spec:
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  json: >
    {
      "title": "Application Metrics",
      "uid": "application-metrics",
      "tags": ["application", "metrics"],
      "timezone": "browser",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "panels": [
        {
          "id": 1,
          "title": "Request Rate",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "targets": [
            {
              "expr": "sum(rate(http_requests_total[5m])) by (method, status, app)",
              "legendFormat": "{{app}} {{method}} {{status}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "title": "Response Time",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "targets": [
            {
              "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, app))",
              "legendFormat": "p99 {{app}}",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, app))",
              "legendFormat": "p95 {{app}}",
              "refId": "B"
            }
          ]
        },
        {
          "id": 3,
          "title": "Active Connections",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
          "targets": [
            {
              "expr": "app_active_connections",
              "legendFormat": "{{app}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "title": "Error Rate",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8},
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{status=~\"5..\"}[5m])) by (app) / sum(rate(http_requests_total[5m])) by (app)",
              "legendFormat": "{{app}}",
              "refId": "A"
            }
          ]
        }
      ]
    }