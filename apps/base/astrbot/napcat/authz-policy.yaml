---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: napcat-ext-auth
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: default-gateway
  action: CUSTOM
  provider:
    name: oauth2-proxy
  rules:
    - to:
        - operation:
            hosts:
              - napcat.isning.moe
            notPaths:
              - /oauth2/*
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: napcat-deny-non-admin
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: default-gateway
  action: DENY
  rules:
    - to:
        - operation:
            hosts:
              - napcat.isning.moe
            notPaths:
              - /oauth2/*
      when:
        - key: request.auth.claims[roles]
          notValues:
            - napcat:admin
