---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tofu-controller
  namespace: flux-system
spec:
  releaseName: tofu-controller
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: tofu-controller
    namespace: flux-system
  install:
    crds: Create
    remediation:
      retries: -1
  upgrade:
    crds: CreateReplace
    remediation:
      retries: -1
  values:
    runner:
      image:
        repository: ghcr.io/isning/k8s-gitops/tf-runner
        tag: v0.16.3-custom-202605130729@sha256:b8632592cd6674517e36cb412c856cdc77c3a6f6b16e42af030f683f16178d99
      serviceAccount:
        allowedNamespaces:
          - flux-system
          - harbor
