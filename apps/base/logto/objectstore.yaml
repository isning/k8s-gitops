apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: logto-pg-objectstore
spec:
  configuration:
    destinationPath: s3://logto-pg-backup/
    endpointURL: https://0fa2f8672cf2637118d8cfee9fe6b95f.r2.cloudflarestorage.com
    s3Credentials:
      accessKeyId:
        name: logto-pg-s3-credentials
        key: access-key
      secretAccessKey:
        name: logto-pg-s3-credentials
        key: secret-key
    wal:
      compression: bzip2
    data:
      compression: bzip2
  # retention triggers maintenance ops that cannot be disabled; CNPG plugin requires it.
  # Removing retention policy provides no benefit.
  retentionPolicy: 7d
  instanceSidecarConfiguration:
    retentionPolicyIntervalSeconds: 86400 # 24h
