apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: clirelay-auth-pvc
  labels:
    app: clirelay
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: clirelay-data-pvc
  labels:
    app: clirelay
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: clirelay-logs-pvc
  labels:
    app: clirelay
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 2Gi
