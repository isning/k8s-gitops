apiVersion: gateway.networking.k8s.io/v1alpha3
kind: TLSRoute
metadata:
  name: direct-to-encapsulated-https-api.github.com
  namespace: egress-system
spec:
  parentRefs:
    - kind: ServiceEntry
      group: networking.istio.io
      name: github-others
      port: 443
  hostnames:
    - api.github.com
  rules:
    - backendRefs:
        - kind: Hostname
          group: networking.istio.io
          name: api.github.com.encapsulated-https.egress-gateway.mesh.internal
          port: 443
---
