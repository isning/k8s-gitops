apiVersion: apps/v1
kind: Deployment
metadata:
  name: debug
spec:
  replicas: 1
  selector:
    matchLabels:
      app: debug
  template:
    metadata:
      labels:
        app: debug
    spec:
      containers:
        - name: debug
          image: ryan4yin/kunbernates-python-client:latest@sha256:e6a5dc667e736da85a304ac56a7f00f6eac4d762afe456c0faee5a4c440917df
          imagePullPolicy: Always
          command:
            - /bin/bash
            - -c
            - while true; do echo "wait..."; sleep 10; done
          securityContext:
            runAsUser: 0 # root
            runAsNonRoot: false
            allowPrivilegeEscalation: false

