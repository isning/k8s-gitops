apiVersion: batch/v1
kind: CronJob
metadata:
  name: proxy-engine-daily-restarter
  namespace: egress-system
spec:
  schedule: "0 4 * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: proxy-engine-restarter-sa
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
          - name: restarter
            image: rancher/kubectl:v1.35.4@sha256:74e5ace6ed37e1c2c230f7fdd5a4565d6b64fe7a388364c18f316210357c6d28
            command:
            - /bin/sh
            - -c
            - "kubectl rollout restart deployment/proxy-engine -n egress-system && echo \"Triggered sing-box restart at $(date)\""
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]
              seccompProfile:
                type: RuntimeDefault
          restartPolicy: OnFailure
