apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: kubernetes-overview
  labels:
    dashboards: grafana
spec:
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  json: >
    {
      "title": "Kubernetes Overview",
      "uid": "kubernetes-overview",
      "tags": ["kubernetes", "overview"],
      "timezone": "browser",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "panels": [
        {
          "id": 1,
          "title": "CPU Usage",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total[5m])) by (namespace, pod)",
              "legendFormat": "{{namespace}}/{{pod}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "title": "Memory Usage",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "targets": [
            {
              "expr": "container_memory_working_set_bytes",
              "legendFormat": "{{namespace}}/{{pod}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "title": "Pod Status",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 8},
          "targets": [
            {
              "expr": "kube_pod_status_phase",
              "legendFormat": "{{phase}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "title": "Container Restarts (1h)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 18, "x": 0, "y": 12},
          "targets": [
            {
              "expr": "sum(increase(kube_pod_container_status_restarts_total[1h])) by (namespace, pod)",
              "legendFormat": "{{namespace}}/{{pod}}",
              "refId": "A"
            }
          ]
        }
      ]
    }