apiVersion: apps/v1
kind: Deployment
metadata:
  name: tunasync-manager
  namespace: opentuna
  labels:
    app: tunasync-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tunasync-manager
  template:
    metadata:
      labels:
        app: tunasync-manager
    spec:
      nodeSelector:
        opentuna.isning.moe/node-role: mirror
      tolerations:
        - key: opentuna.isning.moe/mirror
          operator: Equal
          value: "true"
          effect: NoSchedule
      containers:
        - name: tunasync-manager
          image: tuna/tunasync:latest
          command: ["/usr/bin/tunasync", "manager", "-c", "/etc/tunasync/manager.conf"]
          ports:
            - containerPort: 80
          volumeMounts:
            - name: config
              mountPath: /etc/tunasync
          env:
            - name: TARGET
              value: "production"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /ping
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: tunasync-manager-config
---
apiVersion: v1
kind: Service
metadata:
  name: tunasync-manager
  namespace: opentuna
  labels:
    app: tunasync-manager
spec:
  selector:
    app: tunasync-manager
  ports:
    - name: http
      port: 80
      targetPort: 80
  type: ClusterIP
