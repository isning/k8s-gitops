apiVersion: apps/v1
kind: Deployment
metadata:
  name: opentuna-rubygems-proxy
  namespace: opentuna
  labels:
    app: opentuna-rubygems-proxy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: opentuna-rubygems-proxy
  template:
    metadata:
      labels:
        app: opentuna-rubygems-proxy
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - name: http
              containerPort: 80
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: nginx-conf
          configMap:
            name: opentuna-rubygems-proxy-nginx-conf
---
apiVersion: v1
kind: Service
metadata:
  name: opentuna-rubygems-proxy
  namespace: opentuna
  labels:
    app: opentuna-rubygems-proxy
spec:
  selector:
    app: opentuna-rubygems-proxy
  ports:
    - name: http
      port: 80
      targetPort: http
  type: ClusterIP
