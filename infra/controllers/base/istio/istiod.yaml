# https://fluxcd.io/flux/components/helm/helmreleases/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: istiod
  namespace: istio-system
spec:
  releaseName: istiod
  interval: 30m
  chart:
    spec:
      chart: istiod
      sourceRef:
        kind: HelmRepository
        name: istio
        namespace: flux-system
      interval: 12h
      version: "*"
  # https://github.com/istio/istio/blob/1.27.0/manifests/charts/istio-control/istio-discovery/values.yaml
  values:
    profile: ambient
    global:
      # Used to locate istiod.
      istioNamespace: istio-system
      # enable pod disruption budget for the control plane, which is used to
      # ensure Istio control plane components are gradually upgraded or recovered.
      defaultPodDisruptionBudget:
        enabled: true

      # A minimal set of requested resources to applied to all deployments so that
      # Horizontal Pod Autoscaler will be able to function (if set).
      # Each component can overwrite these default values by adding its own resources
      # block in the relevant section below and setting the desired resources values.
      defaultResources:
        requests:
          cpu: 10m
          memory: 128Mi
        limits:
          cpu: 100m
          memory: 128Mi
    # Enable dual-stack for ambient mode: https://github.com/istio/istio/discussions/57723
    pilot:
      env:
        ISTIO_DUAL_STACK: "true"
        PILOT_ENABLE_ALPHA_GATEWAY_API: "true"
    meshConfig:
      extensionProviders:
        - name: oauth2-proxy
          envoyExtAuthzHttp:
            service: oauth2-proxy.oauth2-proxy.svc.cluster.local
            port: "80"
            pathPrefix: /oauth2/auth
            includeRequestHeadersInCheck:
              - authorization
              - cookie
              - x-auth-request-access-token
              - x-forwarded-for
              - x-forwarded-host
              - x-forwarded-proto
              - x-forwarded-uri
            headersToUpstreamOnAllow:
              - authorization
              - x-auth-request-user
              - x-auth-request-email
              - x-auth-request-preferred-username
              - x-auth-request-access-token
              - x-auth-request-groups
            headersToDownstreamOnDeny:
              - content-type
              - set-cookie
              - location
      defaultConfig:
        proxyMetadata:
          ISTIO_DUAL_STACK: "true"
    ipFamilyPolicy: PreferDualStack
