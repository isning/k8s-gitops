apiVersion: v1
kind: ConfigMap
metadata:
  name: clirelay-config
data:
  config.yaml: |
    host: ""
    port: 8317

    remote-management:
      # Behind OAuth gateway, allow non-localhost management access.
      allow-remote: true
      # Runtime-injected from Kubernetes Secret.
      secret-key: "__REMOTE_MANAGEMENT_SECRET_KEY__"
      disable-control-panel: false
      panel-github-repository: "https://github.com/router-for-me/Cli-Proxy-API-Management-Center"

    # Persist credentials in mounted PVC.
    auth-dir: "/root/.cli-proxy-api"

    api-keys: []

    debug: false
    commercial-mode: false
    logging-to-file: true
    logs-max-total-size-mb: 2048
    usage-statistics-enabled: true
